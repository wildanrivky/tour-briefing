<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Briefing Generator — Tour Leader</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; padding: 1.5rem 1rem 4rem; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
  .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 14px; font-weight: 500; color: #1a1a18; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }
  label { font-size: 12px; color: #666; }
  input, select, textarea { width: 100%; font-size: 14px; padding: 10px; border: 0.5px solid rgba(0,0,0,0.18); border-radius: 8px; background: #fff; color: #1a1a18; outline: none; font-family: inherit; -webkit-appearance: none; }
  textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
  .auto-hint { font-size: 11px; color: #888; font-style: italic; margin: -6px 0 12px; }
  .col-labels { display: grid; grid-template-columns: 64px 1fr 1fr 36px; gap: 6px; margin-bottom: 6px; }
  .col-labels span { font-size: 11px; color: #888; }
  .stop-row { display: grid; grid-template-columns: 64px 1fr 1fr 36px; gap: 6px; align-items: center; margin-bottom: 8px; }
  .t-from-display { font-size: 13px; color: #666; background: #f5f5f3; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; padding: 10px 6px; text-align: center; }
  .stop-row input { font-size: 14px; }
  .btn-del { background: none; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 8px; cursor: pointer; color: #aaa; font-size: 18px; padding: 0; width: 36px; height: 44px; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
  .btn-del:active { background: #f5f5f3; }
  .btn-add { background: none; border: 0.5px dashed rgba(0,0,0,0.25); border-radius: 8px; padding: 12px; font-size: 13px; color: #888; cursor: pointer; width: 100%; margin-top: 6px; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; min-height: 44px; -webkit-tap-highlight-color: transparent; }
  .btn-add:active { background: #f5f5f3; }
  .btn-gen { background: #1a1a18; color: #fff; border: none; border-radius: 8px; padding: 14px 20px; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; margin-bottom: 1rem; font-family: inherit; min-height: 50px; -webkit-tap-highlight-color: transparent; }
  .btn-gen:active { opacity: 0.8; }
  .result-box { background: #f5f5f3; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; white-space: pre-wrap; font-size: 13px; line-height: 1.8; color: #1a1a18; }
  .btn-copy { background: none; border: 0.5px solid rgba(0,0,0,0.18); border-radius: 8px; padding: 12px 16px; font-size: 13px; cursor: pointer; margin-top: 10px; display: flex; align-items: center; gap: 6px; font-family: inherit; min-height: 44px; -webkit-tap-highlight-color: transparent; }
  .btn-copy:active { background: #f5f5f3; }
  .container { max-width: 640px; margin: 0 auto; }
  @media (max-width: 480px) {
    .row3 { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

<h1>Daily Briefing Generator</h1>

<div class="card">
  <p class="card-title">Jadwal pagi</p>
  <div class="row3">
    <div class="field"><label>Sarapan</label><input type="time" id="breakfast" value="06:30"></div>
    <div class="field"><label>Kumpul lobby</label><input type="time" id="lobby" value="08:30"></div>
    <div class="field"><label>Loading koper</label><input type="time" id="loading" value="08:45"></div>
  </div>
  <div class="row2">
    <div class="field"><label>Tour mulai</label><input type="time" id="tourstart" value="09:00" oninput="recalcAll()"></div>
    <div class="field"><label>Hotel malam ini</label><input type="text" id="hotel" placeholder="Nama hotel"></div>
  </div>
</div>

<div class="card">
  <p class="card-title">Itinerary</p>
  <p class="auto-hint">Isi durasi (menit) — jam dihitung otomatis.</p>
  <div class="col-labels">
    <span>Jam mulai</span><span>Durasi (mnt)</span><span>Keterangan</span><span></span>
  </div>
  <div id="stops"></div>
  <button class="btn-add" onclick="addStop()">+ Tambah baris</button>
</div>

<div class="card">
  <p class="card-title">Cuaca & pakaian</p>
  <div class="row3">
    <div class="field"><label>Kondisi</label>
      <select id="weather">
        <option value="cerah">Cerah</option>
        <option value="berawan">Berawan</option>
        <option value="hujan">Hujan</option>
        <option value="bersalju">Bersalju</option>
        <option value="berangin">Berangin</option>
      </select>
    </div>
    <div class="field"><label>Min (°C)</label><input type="number" id="tempmin" value="6"></div>
    <div class="field"><label>Max (°C)</label><input type="number" id="tempmax" value="20"></div>
  </div>
  <div class="field"><label>Saran pakaian</label><textarea id="outfit">Pakai jaket winter, syal dibawa
Jaga-jaga bawa payung</textarea></div>
</div>

<div class="card">
  <p class="card-title">Waktu shalat</p>
  <div class="row2">
    <div class="field"><label>Subuh</label><input type="time" id="subuh" value="03:25"></div>
    <div class="field"><label>Terbit matahari</label><input type="time" id="sunrise" value="06:02"></div>
  </div>
</div>

<div class="card">
  <p class="card-title">Reminder</p>
  <div class="field"><textarea id="reminder">Paspor, HP, dompet dan barang jangan sampai tertinggal
Check & recheck semua tempat di kamar: kasur, kamar mandi, lemari dll</textarea></div>
</div>

<button class="btn-gen" onclick="generate()">Generate briefing</button>

<div id="output" style="display:none;">
  <div class="result-box" id="result-text"></div>
  <button class="btn-copy" onclick="copyText()">Salin ke clipboard</button>
</div>

</div>
<script>
const defaultStops = [
  { dur: 180, label: 'Hotel to Atomium' },
  { dur: 30,  label: 'Atomium' },
  { dur: 60,  label: 'Atomium to Grand Palace' },
  { dur: 150, label: 'Grand Palace' },
  { dur: 270, label: 'Grand Palace to Hotel' },
];
function timeToMinutes(t) {
  if (!t) return 0;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function minutesToTime(mins) {
  const h = Math.floor(mins / 60) % 24;
  const m = mins % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}
function fmt(t) {
  if (!t) return '--:--';
  const [h, m] = t.split(':');
  return h + '.' + m;
}
function recalcAll() {
  const tourstart = document.getElementById('tourstart').value || '09:00';
  let cursor = timeToMinutes(tourstart);
  document.querySelectorAll('#stops .stop-row').forEach(row => {
    row.querySelector('.t-from-display').textContent = fmt(minutesToTime(cursor));
    row.dataset.fromMins = cursor;
    cursor += parseInt(row.querySelector('.t-dur').value) || 0;
    row.dataset.toMins = cursor;
  });
}
function getLastDestination(label) {
  label = label.trim();
  if (/ to /i.test(label)) return label.split(/ to /i).pop().trim();
  return label;
}
function propagateLabelDown(row) {
  const rows = Array.from(document.querySelectorAll('#stops .stop-row'));
  const idx = rows.indexOf(row);
  if (idx < 0 || idx >= rows.length - 1) return;
  const dest = getLastDestination(row.querySelector('.t-label').value);
  const nextLabel = rows[idx + 1].querySelector('.t-label');
  if (!nextLabel.dataset.userEdited) {
    nextLabel.value = dest;
    propagateLabelDown(rows[idx + 1]);
  }
}
function makeRow(dur, label) {
  const row = document.createElement('div');
  row.className = 'stop-row';
  row.dataset.fromMins = 0;
  row.dataset.toMins = 0;
  row.innerHTML = `
    <div class="t-from-display">--:--</div>
    <input type="number" class="t-dur" value="${dur}" min="5" max="600" step="5">
    <input type="text" value="${label}" placeholder="Lokasi" class="t-label">
    <button class="btn-del" onclick="delStop(this)">×</button>
  `;
  row.querySelector('.t-dur').addEventListener('input', recalcAll);
  row.querySelector('.t-label').addEventListener('input', () => {
    row.querySelector('.t-label').dataset.userEdited = '1';
    propagateLabelDown(row);
  });
  return row;
}
function addStop() {
  const rows = Array.from(document.querySelectorAll('#stops .stop-row'));
  let label = rows.length > 0 ? getLastDestination(rows[rows.length-1].querySelector('.t-label').value) : '';
  const row = makeRow(60, label);
  document.getElementById('stops').appendChild(row);
  recalcAll();
  row.querySelector('.t-dur').focus();
}
function delStop(btn) {
  if (document.querySelectorAll('#stops .stop-row').length > 1) {
    btn.parentElement.remove(); recalcAll();
  }
}
function generate() {
  recalcAll();
  const v = id => document.getElementById(id).value;
  let itinerary = '';
  document.querySelectorAll('#stops .stop-row').forEach(row => {
    const from = parseInt(row.dataset.fromMins);
    const dur = parseInt(row.querySelector('.t-dur').value) || 0;
    const loc = row.querySelector('.t-label').value.trim();
    if (loc) itinerary += `${fmt(minutesToTime(from))}-${fmt(minutesToTime(from+dur))} ${loc}\n`;
  });
  const outfit = v('outfit').trim().split('\n').map(l=>l.trim()).filter(Boolean).join('\n');
  const reminder = v('reminder').trim().split('\n').map(l=>l.trim()).filter(Boolean).join('\n');
  const text =
`Agenda Esok hari
Sarapan mulai pkl ${fmt(v('breakfast'))}
Kumpul di lobby sudah membawa koper max pkl ${fmt(v('lobby'))}
Loading koper pkl ${fmt(v('loading'))}
Tour dimulai pkl ${fmt(v('tourstart'))}

Kita akan mengunjungi
${itinerary.trim()}

Cuaca esok hari ${v('weather')} ${v('tempmin')}-${v('tempmax')} derajat
${outfit}

Subuh besok pkl ${fmt(v('subuh'))}
Terbit matahari pkl ${fmt(v('sunrise'))}

${reminder}

Selamat istirahat di ${v('hotel').trim() || 'hotel'} 😊`;
  document.getElementById('result-text').textContent = text;
  document.getElementById('output').style.display = 'block';
  document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
}
function copyText() {
  navigator.clipboard.writeText(document.getElementById('result-text').textContent).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.innerHTML = 'Tersalin!';
    setTimeout(() => { btn.innerHTML = 'Salin ke clipboard'; }, 2000);
  });
}
defaultStops.forEach(s => document.getElementById('stops').appendChild(makeRow(s.dur, s.label)));
recalcAll();
</script>
</body>
</html>
